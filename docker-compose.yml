services:
  plainfare:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "${PLAINFARE_PORT:-3141}:3141"
    volumes:
      - ${PLAINFARE_RECIPES_DIR:-./recipes}:/data/recipes
    env_file:
      - path: .env
        required: false
    environment:
      PLAINFARE_RECIPES_DIR: /data/recipes
    restart: unless-stopped
