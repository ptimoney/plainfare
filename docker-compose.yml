services:
  mise:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "${MISE_PORT:-3000}:3000"
    volumes:
      - ${MISE_RECIPES_DIR:-./recipes}:/data/recipes
    env_file:
      - path: .env
        required: false
    environment:
      MISE_RECIPES_DIR: /data/recipes
    restart: unless-stopped
